<div class="login-container">

  <h1 class="title">Welcome to Podium</h1>

  <div class="login-card">

    <h2>Login</h2>
    <p class="subtitle">Click here to login with:</p>

    <div class="social-buttons">

      <button type="button" class="social-btn github" (click)="loginWithGithub()">
        Github
      </button>

      <button type="button" class="social-btn google" (click)="loginWithGoogle()">
        Google
      </button>

    </div>

    <div class="divider">
      <span>OR CONTINUE WITH</span>
    </div>

    <!-- Angular Form -->
    <form #loginForm="ngForm" (ngSubmit)="onLogin(loginForm)">

      <label>Email</label>
      <input
        type="email"
        name="email"
        placeholder="Enter email"
        ngModel
        required
      />

      <label>Password</label>
      <input
        type="password"
        name="password"
        placeholder="Password"
        ngModel
        required
        minlength="6"
      />

      <button
        type="submit"
        class="login-btn"
        [disabled]="loginForm.invalid"
      >
        Login
      </button>

    </form>

    <div class="links">
      <p>Need account? <a routerLink="/register">Register here</a></p>
      <p>Need password reset? <a routerLink="/reset">Click here</a></p>
    </div>

  </div>

</div>
